version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    # バグ検出
    - bodyclose        # HTTP response body の close 漏れ
    - durationcheck    # time.Duration の計算ミス検出
    - errname          # エラー型の命名規約
    - errorlint        # エラーハンドリングのベストプラクティス
    - makezero         # append 前のスライス長さ問題
    - nilerr           # err != nil チェック後に nil を返す問題
    - reassign         # パッケージ変数の再代入検出

    # コード品質
    - asciicheck       # 非 ASCII 識別子の検出
    - copyloopvar      # ループ変数コピー問題
    - goconst          # 繰り返しの定数化提案
    - gocritic         # 汎用コード改善提案
    - gosec            # セキュリティ問題検出
    - ineffassign      # 無効な代入の検出
    - mirror           # regexp の誤用検出
    - modernize        # Go の新機能活用提案
    - unconvert        # 不要な型変換
    - unparam          # 未使用パラメータ
    - unused           # 未使用コード

    # スタイル
    - dupword          # 重複単語
    - godot            # コメント末尾のピリオド
    - misspell         # スペルミス
    - whitespace       # 不要な空行

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # ゲーム開発ではフィールド並び順の最適化は優先度低
    gocritic:
      settings:
        captLocal:
          paramsOnly: false
    gosec:
      excludes:
        - G404  # math/rand の使用（ゲームでは暗号強度不要）

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - gosec
          - funlen
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/atEaE/go-space

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
  sort-order:
    - linter
    - file
